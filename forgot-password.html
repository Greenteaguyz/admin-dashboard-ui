<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greylux — Reset Password</title>

  <!-- Auth page: no shell, no pre-paint script, no ApexCharts, no shell JS modules -->

  <!-- CDN CSS (pinned) — loaded before local CSS so local tokens override Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous" />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet" />

  <!-- Google Fonts: DM Sans 400/500/700, JetBrains Mono 500/600 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@500;600&display=swap"
    rel="stylesheet" />

  <!-- Local CSS — load order contract: tokens → layout → components → theme -->
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/theme.css" />
</head>
<body>
  <div class="gl-auth-wrap">
    <main class="gl-auth-card">
      <div class="gl-auth-brand">
        <span class="gl-auth-monogram" aria-hidden="true">GL</span>
        <span class="gl-auth-wordmark">greylux</span>
        <h1 class="gl-auth-heading">Reset your password</h1>
        <p class="gl-auth-subtext">Enter your email and we'll send a reset link.</p>
      </div>

      <div id="forgotSlot">
        <form class="gl-auth-form" id="forgotForm" novalidate>
          <div class="gl-field">
            <label class="gl-label" for="forgotEmail">Email address</label>
            <input
              class="gl-input"
              type="email"
              id="forgotEmail"
              name="email"
              autocomplete="email"
              placeholder="you@greylux.com"
              required />
          </div>

          <button class="gl-btn-primary gl-btn-primary--block" type="submit">SEND RESET LINK</button>
        </form>
      </div>

      <div class="gl-auth-links">
        <a class="gl-auth-link" href="login.html">← Back to sign in</a>
      </div>
    </main>
  </div>

  <!-- Minimal inline auth script (Req 10.7): replace the form with an inline
       success message in place, no page reload. Presentational only. -->
  <script>
    document.getElementById('forgotForm').addEventListener('submit', function (e) {
      e.preventDefault();
      var email = document.getElementById('forgotEmail').value;
      var slot = document.getElementById('forgotSlot');
      var msg = document.createElement('div');
      msg.className = 'gl-auth-success';
      msg.setAttribute('role', 'status');
      var icon = document.createElement('i');
      icon.className = 'bi bi-check-circle';
      icon.setAttribute('aria-hidden', 'true');
      var text = document.createElement('span');
      text.textContent = 'Check your inbox. A reset link has been sent to ' + email + '.';
      msg.appendChild(icon);
      msg.appendChild(text);
      slot.replaceChildren(msg);
    });
  </script>

  <!-- CDN JS (pinned) before </body>. Auth pages exclude utils.js/theme.js/sidebar.js/charts.js -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
</body>
</html>
