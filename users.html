  <!-- Pre-paint state (blocking): apply persisted gl-theme + gl-sidebar before first paint -->
  <script>
    (function () {
      try {
        if (localStorage.getItem('gl-theme') === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
        if (localStorage.getItem('gl-sidebar') === 'collapsed') {
          document.documentElement.setAttribute('data-sidebar', 'collapsed');
        }
      } catch (e) { /* best-effort: fall back to documented defaults */ }
    })();
  </script>

    const PAGE_SIZE = 10;

    // -- Per-tab UI state ----------------------------------------------------
    const state = {
      members:      { search: '', status: 'All', type: 'All', page: 1 },
      transactions: { search: '', status: 'All', type: 'All', page: 1 }
    };

    // Minimal escaper for any data interpolated as table cell text.
    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (ch) => (
        { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]
      ));
    }

    // Empty-state markup shown when no records match the active filters.
    function emptyState(message) {
      return (
        '<div class="gl-empty-state">' +
        '<i class="bi bi-inbox" aria-hidden="true"></i>' +
        '<p class="gl-empty-state__title">NO RECORDS FOUND</p>' +
        `<p class="gl-empty-state__hint">${escapeHtml(message)}</p>` +
        '</div>'
      );
    }

    // Pagination controls: Previous/Next + "Showing X–Y of Z {noun}".
    function buildPagination({ start, end, total, totalPages }, page, noun) {
      const label = total === 0
        ? `Showing 0 of 0 ${noun}`
        : `Showing ${start}\u2013${end} of ${total} ${noun}`;
      const prevDisabled = page <= 1 ? ' disabled' : '';
      const nextDisabled = page >= totalPages ? ' disabled' : '';
      return (
        '<div class="gl-pagination">' +
        `<span class="gl-pagination__label">${label}</span>` +
        '<div class="gl-pagination__controls">' +
        `<button type="button" class="gl-pagination__btn" data-page-action="prev"${prevDisabled}>` +
        '<i class="bi bi-chevron-left" aria-hidden="true"></i><span>Previous</span></button>' +
        `<button type="button" class="gl-pagination__btn" data-page-action="next"${nextDisabled}>` +
        '<span>Next</span><i class="bi bi-chevron-right" aria-hidden="true"></i></button>' +
        '</div></div>'
      );
    }

    // -- Members rendering ---------------------------------------------------
    function buildMembersTable(rows) {
      if (rows.length === 0) {
        return emptyState('No accounts match the current filters.');
      }
      const body = rows.map((a) => (
        '<tr>' +
        `<td class="gl-table__mono">${escapeHtml(a.accountId)}</td>` +
        `<td>${escapeHtml(a.holder)}</td>` +
        `<td>${escapeHtml(a.type)}</td>` +
        `<td class="gl-table__amount">${escapeHtml(formatCurrency(a.balance))}</td>` +
        `<td>${renderStatusBadge(a.status)}</td>` +
        `<td class="gl-table__time">${escapeHtml(formatDate(a.opened))}</td>` +
        `<td class="gl-table__time">${escapeHtml(formatDate(a.lastTxn))}</td>` +
        '<td class="gl-table__actions">' +
        `<button type="button" class="gl-action-btn" aria-label="View account ${escapeHtml(a.accountId)}">` +
        '<i class="bi bi-eye" aria-hidden="true"></i></button></td>' +
        '</tr>'
      )).join('');

      return (
        '<div class="table-responsive">' +
        '<table class="table gl-table">' +
        '<thead><tr>' +
        '<th scope="col">Account ID</th>' +
        '<th scope="col">Account Holder</th>' +
        '<th scope="col">Type</th>' +
        '<th scope="col" class="gl-table__amount">Balance</th>' +
        '<th scope="col">Status</th>' +
        '<th scope="col">Opened</th>' +
        '<th scope="col">Last Txn</th>' +
        '<th scope="col">Actions</th>' +
        '</tr></thead>' +
        `<tbody>${body}</tbody>` +
        '</table></div>'
      );
    }

    function renderMembers() {
      const s = state.members;
      const filtered = applyFilters(MOCK_ACCOUNTS, {
        search: s.search, status: s.status, type: s.type,
        searchFields: ['holder', 'accountId']
      });
      const result = paginate(filtered, s.page, PAGE_SIZE);
      s.page = result.totalPages === 0 ? 1 : Math.min(s.page, result.totalPages);
      document.getElementById('gl-members-table').innerHTML = buildMembersTable(result.pageItems);
      document.getElementById('gl-members-pagination').innerHTML =
        buildPagination(result, s.page, 'accounts');
    }

    // -- Transactions rendering ---------------------------------------------
    function buildTxnTable(rows) {
      if (rows.length === 0) {
        return emptyState('No transactions match the current filters.');
      }
      const body = rows.map((t) => (
        '<tr>' +
        `<td class="gl-table__mono">${escapeHtml(t.txnId)}</td>` +
        `<td class="gl-table__mono">${escapeHtml(t.account)}</td>` +
        `<td>${escapeHtml(t.type)}</td>` +
        `<td class="gl-table__amount">${escapeHtml(formatCurrency(t.amount))}</td>` +
        `<td>${renderStatusBadge(t.status)}</td>` +
        `<td class="gl-table__time">${escapeHtml(formatDate(t.timestamp))}</td>` +
        '</tr>'
      )).join('');

      return (
        '<div class="table-responsive">' +
        '<table class="table gl-table">' +
        '<thead><tr>' +
        '<th scope="col">TXN ID</th>' +
        '<th scope="col">Account</th>' +
        '<th scope="col">Type</th>' +
        '<th scope="col" class="gl-table__amount">Amount</th>' +
        '<th scope="col">Status</th>' +
        '<th scope="col">Timestamp</th>' +
        '</tr></thead>' +
        `<tbody>${body}</tbody>` +
        '</table></div>'
      );
    }

    function renderTransactions() {
      const s = state.transactions;
      const filtered = applyFilters(MOCK_TRANSACTIONS, {
        search: s.search, status: s.status, type: s.type,
        searchFields: ['txnId', 'account']
      });
      const result = paginate(filtered, s.page, PAGE_SIZE);
      s.page = result.totalPages === 0 ? 1 : Math.min(s.page, result.totalPages);
      document.getElementById('gl-txn-table').innerHTML = buildTxnTable(result.pageItems);
      document.getElementById('gl-txn-pagination').innerHTML =
        buildPagination(result, s.page, 'transactions');
    }

    // -- Tab activation + hash routing (Req 8.1–8.4) ------------------------
    const tabs = {
      members: {
        btn: document.getElementById('gl-tab-members'),
        panel: document.getElementById('gl-panel-members')
      },
      transactions: {
        btn: document.getElementById('gl-tab-transactions'),
        panel: document.getElementById('gl-panel-transactions')
      }
    };

    function activateTab(name, updateHash = true) {
      const tab = tabs[name] ? name : 'members';
      Object.keys(tabs).forEach((key) => {
        const isActive = key === tab;
        tabs[key].btn.setAttribute('aria-selected', String(isActive));
        tabs[key].btn.tabIndex = isActive ? 0 : -1;
        tabs[key].panel.hidden = !isActive;
      });
      // Update the hash WITHOUT triggering a reload or a hashchange feedback loop.
      if (updateHash) {
        const target = `#${tab}`;
        if (location.hash !== target) {
          history.replaceState(null, '', target);
        }
      }
    }

    // -- Initial render via renderWithSkeleton (DataUtils loading contract) --
    renderWithSkeleton(
      document.getElementById('gl-members-table'),
      () => MOCK_ACCOUNTS,
      () => { renderMembers(); return document.getElementById('gl-members-table').innerHTML; }
    );
    renderWithSkeleton(
      document.getElementById('gl-txn-table'),
      () => MOCK_TRANSACTIONS,
      () => { renderTransactions(); return document.getElementById('gl-txn-table').innerHTML; }
    );

    // -- Wire tab buttons ----------------------------------------------------
    Object.keys(tabs).forEach((name) => {
      tabs[name].btn.addEventListener('click', () => activateTab(name));
    });
    // Respond to external hash changes (e.g. arriving from index.html#transactions).
    window.addEventListener('hashchange', () => activateTab(resolveTab(location.hash), false));

    // -- Wire Members filters (reset to page 1 on any filter change) --------
    const membersSearch = document.getElementById('gl-members-search');
    const membersStatus = document.getElementById('gl-members-status');
    const membersType = document.getElementById('gl-members-type');
    membersSearch.addEventListener('input', () => {
      state.members.search = membersSearch.value; state.members.page = 1; renderMembers();
    });
    membersStatus.addEventListener('change', () => {
      state.members.status = membersStatus.value; state.members.page = 1; renderMembers();
    });
    membersType.addEventListener('change', () => {
      state.members.type = membersType.value; state.members.page = 1; renderMembers();
    });

    // -- Wire Transactions filters ------------------------------------------
    const txnSearch = document.getElementById('gl-txn-search');
    const txnStatus = document.getElementById('gl-txn-status');
    const txnType = document.getElementById('gl-txn-type');
    txnSearch.addEventListener('input', () => {
      state.transactions.search = txnSearch.value; state.transactions.page = 1; renderTransactions();
    });
    txnStatus.addEventListener('change', () => {
      state.transactions.status = txnStatus.value; state.transactions.page = 1; renderTransactions();
    });
    txnType.addEventListener('change', () => {
      state.transactions.type = txnType.value; state.transactions.page = 1; renderTransactions();
    });

    // -- Pagination (event delegation per panel) ----------------------------
    document.getElementById('gl-members-pagination').addEventListener('click', (ev) => {
      const btn = ev.target.closest('[data-page-action]');
      if (!btn || btn.disabled) return;
      state.members.page += btn.dataset.pageAction === 'next' ? 1 : -1;
      renderMembers();
    });
    document.getElementById('gl-txn-pagination').addEventListener('click', (ev) => {
      const btn = ev.target.closest('[data-page-action]');
      if (!btn || btn.disabled) return;
      state.transactions.page += btn.dataset.pageAction === 'next' ? 1 : -1;
      renderTransactions();
    });

    // -- Resolve the active tab from the URL hash on load (Req 8.3, 8.4) ----
    activateTab(resolveTab(location.hash));
  </script>
</body>
</html>
